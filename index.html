<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A4 Collage Pro — Multi-Page Photo Arranger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: rgba(30, 41, 59, 0.6);
    --border: rgba(148, 163, 184, 0.15);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --accent: #6366f1;
    --success: #10b981;
    --danger: #ef4444;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: 
      radial-gradient(circle at 20% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
      var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .app-header {
    padding: 20px 24px;
    background: rgba(17, 24, 39, 0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-content {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
  }
  .logo-text h1 {
    font-size: 1.15rem; font-weight: 700;
    background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-text p { font-size: 0.75rem; color: var(--text-secondary); }
  .page-counter {
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.3);
    padding: 8px 16px; border-radius: 20px;
    font-size: 0.85rem; font-weight: 600; color: #c7d2fe;
  }

  /* ── Main Layout ── */
  .app-container {
    max-width: 1600px; margin: 0 auto; padding: 20px;
    display: grid; grid-template-columns: 340px 1fr; gap: 24px;
  }

  /* ── Control Panel ─ */
  .controls {
    background: var(--bg-card); backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; height: fit-content;
  }
  .controls::-webkit-scrollbar { width: 6px; }
  .controls::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 3px; }

  .section { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .section-title {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--accent); margin-bottom: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px;
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed rgba(99, 102, 241, 0.4); border-radius: var(--radius-sm);
    padding: 28px 16px; text-align: center; cursor: pointer;
    transition: all 0.3s ease; background: rgba(99, 102, 241, 0.04);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent); background: rgba(99, 102, 241, 0.1); transform: translateY(-2px);
  }
  .upload-zone .icon { font-size: 2.2rem; margin-bottom: 10px; }
  .upload-zone .text { font-size: 0.9rem; color: var(--text-primary); font-weight: 500; }
  .upload-zone .hint { font-size: 0.75rem; color: var(--text-secondary); margin-top: 6px; }

  /* Thumbnail Grid */
  .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
  .thumb-slot {
    aspect-ratio: 1; background: rgba(15, 23, 42, 0.6);
    border: 2px solid var(--border); border-radius: 10px;
    overflow: hidden; position: relative; cursor: pointer; transition: all 0.2s ease;
  }
  .thumb-slot:hover { border-color: var(--accent); transform: scale(1.05); }
  .thumb-slot.filled { border-color: var(--success); }
  .thumb-slot img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-slot .remove {
    position: absolute; top: 3px; right: 3px; width: 22px; height: 22px;
    background: rgba(239, 68, 68, 0.95); color: white; border: none; border-radius: 50%;
    font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .thumb-slot:hover .remove { opacity: 1; }
  .thumb-slot .slot-num {
    position: absolute; top: 3px; left: 3px; font-size: 0.7rem; color: white;
    background: rgba(0,0,0,0.7); padding: 2px 7px; border-radius: 4px; font-weight: 600;
  }
  .thumb-slot.empty::after {
    content: '+'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 1.5rem; font-weight: 300;
  }

  /* Form Controls */
  .control-group { margin-bottom: 14px; }
  .control-group:last-child { margin-bottom: 0; }
  .control-group label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.85rem; color: var(--text-primary); margin-bottom: 8px; font-weight: 500;
  }
  .range-value {
    font-size: 0.8rem; color: var(--accent); font-weight: 600;
    background: rgba(99, 102, 241, 0.15); padding: 2px 8px; border-radius: 4px;
  }
  .control-group select, .control-group input[type="range"] {
    width: 100%; padding: 10px 12px; background: rgba(15, 23, 42, 0.8);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-primary); font-size: 0.9rem; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .control-group select:focus { border-color: var(--accent); }
  .control-group input[type="range"] { padding: 0; height: 6px; accent-color: var(--accent); cursor: pointer; }
  .control-group input[type="color"] {
    width: 100%; height: 44px; border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; background: transparent; padding: 4px;
  }

  /* Buttons */
  .btn {
    width: 100%; padding: 13px 16px; border: none; border-radius: var(--radius-sm);
    font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.25s ease;
    margin-bottom: 10px; display: flex; align-items: center; justify-content: center;
    gap: 8px; font-family: inherit; position: relative; overflow: hidden;
  }
  .btn:last-child { margin-bottom: 0; }
  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white;
    box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5); }
  .btn-success {
    background: linear-gradient(135deg, #10b981, #059669); color: white;
    box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
  }
  .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.5); }
  .btn-danger { background: rgba(239, 68, 68, 0.12); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
  .btn-danger:hover { background: rgba(239, 68, 68, 0.22); }

  /* Status */
  .status {
    padding: 10px 14px; border-radius: 8px; font-size: 0.85rem;
    margin-top: 12px; display: none; animation: slideIn 0.3s ease;
  }
  .status.show { display: block; }
  .status.success { background: rgba(16, 185, 129, 0.12); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
  .status.error { background: rgba(239, 68, 68, 0.12); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
  .status.info { background: rgba(99, 102, 241, 0.12); color: #c7d2fe; border: 1px solid rgba(99, 102, 241, 0.3); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Preview Area ── */
  .preview-area {
    background: var(--bg-card); backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 30px 20px; min-height: 600px;
    display: flex; flex-direction: column; align-items: center; gap: 30px; overflow-x: auto;
  }
  .preview-label {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--text-secondary); font-weight: 600; align-self: flex-start;
  }
  .pages-wrapper { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; }
  .page-wrapper { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
  .page-label {
    background: var(--accent); color: white; padding: 6px 16px;
    border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    margin-bottom: 12px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
  }

  /* A4 Paper */
  .a4-paper {
    background: white;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05);
    transition: transform 0.3s ease; transform-origin: top center;
  }
  .a4-paper.portrait { width: 210mm; height: 297mm; }
  .a4-paper.landscape { width: 297mm; height: 210mm; }

  .a4-content { width: 100%; height: 100%; display: grid; }
  .a4-content.layout-2x3 { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); }
  .a4-content.layout-3x2 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }
  .a4-content.layout-1x6 { grid-template-columns: 1fr; grid-template-rows: repeat(6, 1fr); }
  .a4-content.layout-6x1 { grid-template-columns: repeat(6, 1fr); grid-template-rows: 1fr; }

  .photo-cell { background: #f8fafc; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  .photo-cell img { width: 100%; height: 100%; object-fit: cover; }
  .photo-cell img.fit-contain { object-fit: contain; }
  .photo-cell.empty {
    background: repeating-linear-gradient(45deg, #f1f5f9, #f1f5f9 10px, #e2e8f0 10px, #e2e8f0 20px);
  }
  .photo-cell.empty::after {
    content: 'Empty Slot'; color: #94a3b8; font-size: 13px; font-weight: 500; letter-spacing: 0.05em;
  }

  /* ─ Responsive (Mobile Layout) ── */
  @media (max-width: 1100px) {
    .app-container {
      grid-template-columns: 1fr;
      padding: 16px;
      gap: 20px;
    }
    .controls {
      position: relative;
      top: auto; left: auto; right: auto; bottom: auto;
      max-height: none;
      border-radius: var(--radius);
      transform: none;
      margin-bottom: 20px;
    }
    .preview-area { padding: 20px 12px; min-height: auto; }
    .pages-wrapper { gap: 24px; }
  }
  @media (max-width: 600px) {
    .app-header { padding: 14px 16px; }
    .logo-text h1 { font-size: 1rem; }
    .logo-text p { font-size: 0.7rem; }
    .page-counter { padding: 6px 12px; font-size: 0.75rem; }
    .preview-area { padding: 16px 8px; }
  }

  /*  Print Styles ── */
  @media print {
    body * { visibility: hidden !important; }
    .a4-paper, .a4-paper * { visibility: visible !important; }
    .a4-paper { position: absolute; left: 0; top: 0; box-shadow: none; margin: 0; page-break-after: always; }
    .a4-paper:last-child { page-break-after: auto; }
    @page { size: A4; margin: 0; }
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(10, 14, 26, 0.9);
    backdrop-filter: blur(8px); display: none; align-items: center;
    justify-content: center; z-index: 1000; flex-direction: column; gap: 20px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 50px; height: 50px; border: 4px solid rgba(99, 102, 241, 0.2);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-primary); font-size: 1rem; font-weight: 500; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">📄</div>
      <div class="logo-text">
        <h1>A4 Collage Pro</h1>
        <p>Multi-Page Photo Arranger</p>
      </div>
    </div>
    <div class="page-counter" id="pageCounter">0 Pages · 0 Photos</div>
  </div>
</header>

<div class="app-container">
  <!-- Controls Section -->
  <aside class="controls" id="controlsPanel">
    <div class="section">
      <div class="section-title">Upload Photos</div>
      <div class="upload-zone" id="uploadZone">
        <div class="icon">📤</div>
        <div class="text">Click or drop photos here</div>
        <div class="hint">Unlimited · JPG, PNG, WEBP</div>
      </div>
      <input type="file" id="bulkUpload" accept="image/*" multiple style="display:none;">
      <div class="thumb-grid" id="thumbGrid"></div>
    </div>

    <div class="section">
      <div class="section-title">Page Layout</div>
      <div class="control-group">
        <label>Orientation</label>
        <select id="orientation">
          <option value="portrait">Portrait (Vertical)</option>
          <option value="landscape">Landscape (Horizontal)</option>
        </select>
      </div>
      <div class="control-group">
        <label>Grid Pattern</label>
        <select id="gridLayout">
          <option value="2x3">2 × 3 (6 photos)</option>
          <option value="3x2">3 × 2 (6 photos)</option>
          <option value="1x6">1 × 6 Strip (Vertical)</option>
          <option value="6x1">6 × 1 Strip (Horizontal)</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Spacing</div>
      <div class="control-group">
        <label>Page Margin <span class="range-value" id="marginVal">15mm</span></label>
        <input type="range" id="margin" min="5" max="30" value="15">
      </div>
      <div class="control-group">
        <label>Photo Gap <span class="range-value" id="gapVal">8mm</span></label>
        <input type="range" id="gap" min="0" max="20" value="8">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Photo Style</div>
      <div class="control-group">
        <label>Image Fit</label>
        <select id="fitMode">
          <option value="cover">Cover (Fill & Crop)</option>
          <option value="contain">Contain (Full Image)</option>
        </select>
      </div>
      <div class="control-group">
        <label>Paper Background</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Export</div>
      <button class="btn btn-primary" id="downloadBtn">️ Download Pages</button>
      <button class="btn btn-success" id="printBtn">️ Print All Pages</button>
      <button class="btn btn-danger" id="resetBtn">🗑️ Clear All</button>
      <div class="status" id="status"></div>
    </div>
  </aside>

  <!-- Preview Section -->
  <main class="preview-area">
    <div class="preview-label">Live Preview</div>
    <div class="pages-wrapper" id="pagesWrapper"></div>
  </main>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Generating your collage...</div>
</div>

<script>
  const PHOTOS_PER_PAGE = 6;
  const state = {
    photos: [],
    orientation: 'portrait',
    layout: '2x3',
    margin: 15,
    gap: 8,
    fit: 'cover',
    bgColor: '#ffffff'
  };

  const uploadZone = document.getElementById('uploadZone');
  const bulkUpload = document.getElementById('bulkUpload');
  const thumbGrid = document.getElementById('thumbGrid');
  const pagesWrapper = document.getElementById('pagesWrapper');
  const pageCounter = document.getElementById('pageCounter');
  const status = document.getElementById('status');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const loadingText = document.getElementById('loadingText');

  function init() {
    renderThumbnails();
    renderPages();
    bindEvents();
    handleResize();
    window.addEventListener('resize', handleResize);
  }

  function getPages() {
    const pages = [];
    for (let i = 0; i < state.photos.length; i += PHOTOS_PER_PAGE) {
      pages.push(state.photos.slice(i, i + PHOTOS_PER_PAGE));
    }
    if (pages.length === 0) pages.push([]);
    return pages;
  }

  function renderThumbnails() {
    thumbGrid.innerHTML = '';
    const totalPages = Math.ceil(state.photos.length / PHOTOS_PER_PAGE) || 1;
    const totalSlots = totalPages * PHOTOS_PER_PAGE;
    
    for (let i = 0; i < Math.min(totalSlots, 12); i++) {
      const src = state.photos[i];
      const slot = document.createElement('div');
      slot.className = `thumb-slot ${src ? 'filled' : 'empty'}`;
      slot.innerHTML = src ? `
        <span class="slot-num">${i + 1}</span>
        <img src="${src}" alt="Photo ${i+1}">
        <button class="remove" data-i="${i}" title="Remove">✕</button>
      ` : '';
      slot.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove')) {
          state.photos.splice(i, 1);
          renderThumbnails();
          renderPages();
          updateCounter();
          return;
        }
        triggerSlotUpload(i);
      });
      thumbGrid.appendChild(slot);
    }
  }

  function renderPages() {
    const pages = getPages();
    pagesWrapper.innerHTML = '';

    pages.forEach((pagePhotos, pageIndex) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'page-wrapper';

      const label = document.createElement('div');
      label.className = 'page-label';
      label.textContent = `Page ${pageIndex + 1} of ${pages.length}`;
      wrapper.appendChild(label);

      const paper = document.createElement('div');
      paper.className = `a4-paper ${state.orientation}`;
      paper.dataset.pageIndex = pageIndex;
      paper.style.background = state.bgColor;

      const content = document.createElement('div');
      content.className = `a4-content layout-${state.layout}`;
      content.style.padding = `${state.margin}mm`;
      content.style.gap = `${state.gap}mm`;

      for (let i = 0; i < PHOTOS_PER_PAGE; i++) {
        const cell = document.createElement('div');
        cell.className = `photo-cell ${pagePhotos[i] ? '' : 'empty'}`;
        if (pagePhotos[i]) {
          const img = document.createElement('img');
          img.src = pagePhotos[i];
          if (state.fit === 'contain') img.className = 'fit-contain';
          cell.appendChild(img);
        }
        content.appendChild(cell);
      }

      paper.appendChild(content);
      wrapper.appendChild(paper);
      pagesWrapper.appendChild(wrapper);
    });

    scalePages();
    updateCounter();
  }

  function scalePages() {
    const papers = document.querySelectorAll('.a4-paper');
    const isMobile = window.innerWidth <= 1100;
    
    papers.forEach(paper => {
      if (isMobile) {
        const containerWidth = pagesWrapper.clientWidth - 20;
        const paperWidth = state.orientation === 'portrait' ? 794 : 1123;
        const scale = Math.min(containerWidth / paperWidth, 1);
        paper.style.transform = `scale(${scale})`;
        paper.style.marginBottom = `${-paper.offsetHeight * (1 - scale)}px`;
      } else {
        paper.style.transform = 'scale(0.85)';
        paper.style.marginBottom = '-45mm';
      }
    });
  }

  function handleResize() { scalePages(); }

  function updateCounter() {
    const pages = getPages();
    pageCounter.textContent = `${pages.length} Page${pages.length !== 1 ? 's' : ''} · ${state.photos.length} Photo${state.photos.length !== 1 ? 's' : ''}`;
  }

  function triggerSlotUpload(index) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = (e) => { if (e.target.files[0]) loadFile(e.target.files[0], index); };
    input.click();
  }

  function loadFile(file, index) {
    const reader = new FileReader();
    reader.onload = (e) => {
      if (index < state.photos.length) state.photos[index] = e.target.result;
      else state.photos[index] = e.target.result;
      renderThumbnails(); renderPages();
      showStatus(`Photo ${index + 1} added`, 'success');
    };
    reader.readAsDataURL(file);
  }

  function handleBulkFiles(files) {
    const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (imageFiles.length === 0) { showStatus('No valid images found', 'error'); return; }
    
    let loaded = 0;
    imageFiles.forEach((file) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        state.photos.push(e.target.result);
        loaded++;
        if (loaded === imageFiles.length) {
          renderThumbnails(); renderPages();
          showStatus(`✅ Added ${loaded} photo${loaded > 1 ? 's' : ''}`, 'success');
        }
      };
      reader.readAsDataURL(file);
    });
  }

  uploadZone.addEventListener('click', () => bulkUpload.click());
  bulkUpload.addEventListener('change', (e) => handleBulkFiles(e.target.files));

  ['dragenter', 'dragover'].forEach(evt => {
    uploadZone.addEventListener(evt, (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  });
  ['dragleave', 'drop'].forEach(evt => {
    uploadZone.addEventListener(evt, (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); });
  });
  uploadZone.addEventListener('drop', (e) => { if (e.dataTransfer.files.length) handleBulkFiles(e.dataTransfer.files); });

  function bindEvents() {
    document.getElementById('orientation').addEventListener('change', (e) => { state.orientation = e.target.value; renderPages(); });
    document.getElementById('gridLayout').addEventListener('change', (e) => { state.layout = e.target.value; renderPages(); });
    document.getElementById('margin').addEventListener('input', (e) => { state.margin = e.target.value; document.getElementById('marginVal').textContent = `${state.margin}mm`; renderPages(); });
    document.getElementById('gap').addEventListener('input', (e) => { state.gap = e.target.value; document.getElementById('gapVal').textContent = `${state.gap}mm`; renderPages(); });
    document.getElementById('fitMode').addEventListener('change', (e) => { state.fit = e.target.value; renderPages(); });
    document.getElementById('bgColor').addEventListener('input', (e) => { state.bgColor = e.target.value; renderPages(); });

    document.getElementById('downloadBtn').addEventListener('click', handleSmartDownload);
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (state.photos.length === 0) return;
      if (confirm('Clear all photos?')) {
        state.photos = []; renderThumbnails(); renderPages();
        showStatus('All photos cleared', 'info');
      }
    });
  }

  // ─ SMART DOWNLOAD: PNG for 1 page, ZIP for multiple ──
  async function handleSmartDownload() {
    if (state.photos.length === 0) { showStatus('Add at least one photo first', 'error'); return; }

    const papers = document.querySelectorAll('.a4-paper');
    
    // SINGLE PAGE: Download directly as PNG
    if (papers.length === 1) {
      showLoading('Generating image...');
      try {
        const canvas = await html2canvas(papers[0], {
          scale: 2, useCORS: true, backgroundColor: state.bgColor, logging: false
        });
        const link = document.createElement('a');
        link.download = `collage.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        hideLoading();
        showStatus('✅ Downloaded page as PNG', 'success');
      } catch (err) {
        hideLoading();
        showStatus('Failed to generate image', 'error');
      }
      return;
    }

    // MULTIPLE PAGES: Download as ZIP
    showLoading('Rendering pages...');
    const zip = new JSZip();

    try {
      for (let i = 0; i < papers.length; i++) {
        updateLoadingText(`Processing page ${i + 1} of ${papers.length}...`);
        const canvas = await html2canvas(papers[i], {
          scale: 2, useCORS: true, backgroundColor: state.bgColor, logging: false
        });
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        zip.file(`collage-page-${i + 1}.png`, blob);
      }

      updateLoadingText('Zipping files...');
      const content = await zip.generateAsync({ type: 'blob' });
      
      const link = document.createElement('a');
      link.href = URL.createObjectURL(content);
      link.download = `collage-${Date.now()}.zip`;
      link.click();
      URL.revokeObjectURL(link.href);

      hideLoading();
      showStatus(`✅ Downloaded ${papers.length} separate pages in ZIP`, 'success');
    } catch (err) {
      hideLoading();
      showStatus('Failed to generate images', 'error');
    }
  }

  function showLoading(text) { loadingText.textContent = text; loadingOverlay.classList.add('show'); }
  function updateLoadingText(text) { loadingText.textContent = text; }
  function hideLoading() { loadingOverlay.classList.remove('show'); }

  function showStatus(msg, type) {
    status.textContent = msg; status.className = `status show ${type}`;
    setTimeout(() => { status.classList.remove('show'); }, 3500);
  }

  init();
</script>
</body>
