<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4 Photo Collage Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
  }

  /* ── Control Panel ── */
  .controls {
    background: rgba(30, 41, 59, 0.8);
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 24px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }

  .controls h1 {
    font-size: 1.4rem;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .controls .subtitle {
    color: #94a3b8;
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #64748b;
    margin: 20px 0 10px;
    font-weight: 600;
  }

  /* Upload Zone */
  .upload-zone {
    border: 2px dashed #475569;
    border-radius: 12px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(15, 23, 42, 0.4);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.08);
  }
  .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone .text { font-size: 0.9rem; color: #cbd5e1; }
  .upload-zone .hint { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

  /* Thumbnail Grid */
  .thumb-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .thumb-slot {
    aspect-ratio: 1;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid #334155;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .thumb-slot:hover { border-color: #3b82f6; }
  .thumb-slot img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .thumb-slot .remove {
    position: absolute; top: 2px; right: 2px;
    width: 20px; height: 20px;
    background: rgba(239, 68, 68, 0.9);
    color: white; border: none; border-radius: 50%;
    font-size: 0.7rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .thumb-slot:hover .remove { opacity: 1; }
  .thumb-slot .slot-num {
    position: absolute; top: 4px; left: 4px;
    font-size: 0.7rem; color: #94a3b8;
    background: rgba(0,0,0,0.5);
    padding: 2px 6px; border-radius: 4px;
  }

  /* Form Controls */
  .control-group { margin-bottom: 14px; }
  .control-group label {
    display: block;
    font-size: 0.85rem;
    color: #cbd5e1;
    margin-bottom: 6px;
  }
  .control-group select,
  .control-group input[type="range"] {
    width: 100%;
    padding: 8px 10px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.9rem;
  }
  .control-group input[type="range"] {
    padding: 0;
    accent-color: #3b82f6;
  }
  .range-value {
    display: inline-block;
    float: right;
    font-size: 0.8rem;
    color: #3b82f6;
    font-weight: 600;
  }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
  .btn-secondary {
    background: rgba(51, 65, 85, 0.6);
    color: #e2e8f0;
    border: 1px solid #475569;
  }
  .btn-secondary:hover { background: rgba(71, 85, 105, 0.8); }
  .btn-danger {
    background: rgba(239, 68, 68, 0.15);
    color: #fca5a5;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }
  .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }

  /* ── Preview Area ── */
  .preview-area {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    background: rgba(15, 23, 42, 0.4);
    border: 1px solid #334155;
    border-radius: 16px;
    overflow: auto;
  }

  /* A4 Paper */
  .a4-paper {
    background: white;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    transition: all 0.3s ease;
    position: relative;
  }
  .a4-paper.portrait {
    width: 210mm;
    height: 297mm;
  }
  .a4-paper.landscape {
    width: 297mm;
    height: 210mm;
  }

  .a4-content {
    width: 100%;
    height: 100%;
    padding: 15mm;
    display: grid;
    gap: 10mm;
  }
  .a4-content.layout-2x3 { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); }
  .a4-content.layout-3x2 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; }
  .a4-content.layout-1x6 { grid-template-columns: 1fr; grid-template-rows: repeat(6, 1fr); }
  .a4-content.layout-6x1 { grid-template-columns: repeat(6, 1fr); grid-template-rows: 1fr; }

  .photo-cell {
    background: #f1f5f9;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .photo-cell img.fit-contain { object-fit: contain; }
  .photo-cell.empty {
    background: repeating-linear-gradient(
      45deg,
      #f1f5f9,
      #f1f5f9 10px,
      #e2e8f0 10px,
      #e2e8f0 20px
    );
  }
  .photo-cell.empty::after {
    content: 'No Image';
    color: #94a3b8;
    font-size: 14px;
    font-weight: 500;
  }

  /* Hidden file inputs */
  #bulkUpload, .slot-upload { display: none; }

  /* Status */
  .status {
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-top: 10px;
    display: none;
  }
  .status.success { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; display: block; }
  .status.error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; display: block; }

  /* ── Print Styles ── */
  @media print {
    body * { visibility: hidden; }
    .a4-paper, .a4-paper * { visibility: visible; }
    .a4-paper {
      position: absolute;
      left: 0; top: 0;
      box-shadow: none;
      margin: 0;
    }
    @page {
      size: A4;
      margin: 0;
    }
  }

  /* Responsive */
  @media (max-width: 1100px) {
    .container { grid-template-columns: 1fr; }
    .controls { position: static; }
    .a4-paper { transform: scale(0.7); transform-origin: top center; }
  }
  @media (max-width: 600px) {
    .a4-paper { transform: scale(0.45); }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Control Panel -->
  <aside class="controls">
    <h1>📄 A4 Collage Maker</h1>
    <p class="subtitle">Upload 6 photos • Arrange • Print or Download</p>

    <!-- Upload -->
    <div class="section-title">Upload Photos</div>
    <div class="upload-zone" id="uploadZone">
      <div class="icon">📤</div>
      <div class="text">Click or drag 6 photos here</div>
      <div class="hint">JPG, PNG, WEBP supported</div>
    </div>
    <input type="file" id="bulkUpload" accept="image/*" multiple>

    <div class="thumb-grid" id="thumbGrid"></div>

    <!-- Layout -->
    <div class="section-title">Layout</div>
    <div class="control-group">
      <label>Orientation</label>
      <select id="orientation">
        <option value="portrait">Portrait (Vertical)</option>
        <option value="landscape">Landscape (Horizontal)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Grid Layout</label>
      <select id="gridLayout">
        <option value="2x3">2 Columns × 3 Rows</option>
        <option value="3x2">3 Columns × 2 Rows</option>
        <option value="1x6">1 Column × 6 Rows (Strip)</option>
        <option value="6x1">6 Columns × 1 Row (Strip)</option>
      </select>
    </div>

    <!-- Spacing -->
    <div class="section-title">Spacing</div>
    <div class="control-group">
      <label>Page Margin <span class="range-value" id="marginVal">15mm</span></label>
      <input type="range" id="margin" min="5" max="30" value="15">
    </div>
    <div class="control-group">
      <label>Photo Gap <span class="range-value" id="gapVal">10mm</span></label>
      <input type="range" id="gap" min="0" max="20" value="10">
    </div>

    <!-- Photo Fit -->
    <div class="section-title">Photo Fit</div>
    <div class="control-group">
      <label>Image Fit Mode</label>
      <select id="fitMode">
        <option value="cover">Cover (Fill & Crop)</option>
        <option value="contain">Contain (Full Image)</option>
      </select>
    </div>

    <!-- Background -->
    <div class="section-title">Paper Background</div>
    <div class="control-group">
      <label>Background Color</label>
      <input type="color" id="bgColor" value="#ffffff" style="width:100%;height:40px;border:none;border-radius:8px;cursor:pointer;">
    </div>

    <!-- Actions -->
    <div class="section-title">Actions</div>
    <button class="btn btn-primary" id="downloadBtn">⬇️ Download as PNG</button>
    <button class="btn btn-secondary" id="printBtn">🖨️ Print Directly</button>
    <button class="btn btn-danger" id="resetBtn">🗑️ Clear All</button>

    <div class="status" id="status"></div>
  </aside>

  <!-- Preview -->
  <main class="preview-area">
    <div class="a4-paper portrait" id="a4Paper">
      <div class="a4-content layout-2x3" id="a4Content">
        <!-- 6 photo cells injected by JS -->
      </div>
    </div>
  </main>
</div>

<script>
  // ── State ──
  const photos = [null, null, null, null, null, null];
  const state = {
    orientation: 'portrait',
    layout: '2x3',
    margin: 15,
    gap: 10,
    fit: 'cover',
    bgColor: '#ffffff'
  };

  // ── DOM refs ──
  const uploadZone = document.getElementById('uploadZone');
  const bulkUpload = document.getElementById('bulkUpload');
  const thumbGrid = document.getElementById('thumbGrid');
  const a4Paper = document.getElementById('a4Paper');
  const a4Content = document.getElementById('a4Content');
  const status = document.getElementById('status');

  // ── Initialize ──
  function init() {
    renderThumbnails();
    renderA4();
    bindEvents();
  }

  // ── Render thumbnail slots ──
  function renderThumbnails() {
    thumbGrid.innerHTML = '';
    photos.forEach((src, i) => {
      const slot = document.createElement('div');
      slot.className = 'thumb-slot';
      slot.innerHTML = `
        <span class="slot-num">${i + 1}</span>
        ${src ? `<img src="${src}" alt="Photo ${i+1}">
                 <button class="remove" data-i="${i}" title="Remove">✕</button>` : ''}
      `;
      slot.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove')) {
          photos[i] = null;
          renderThumbnails();
          renderA4();
          return;
        }
        triggerSlotUpload(i);
      });
      thumbGrid.appendChild(slot);
    });
  }

  // ── Render A4 preview ──
  function renderA4() {
    a4Paper.className = `a4-paper ${state.orientation}`;
    a4Paper.style.background = state.bgColor;
    a4Content.className = `a4-content layout-${state.layout}`;
    a4Content.style.padding = `${state.margin}mm`;
    a4Content.style.gap = `${state.gap}mm`;

    a4Content.innerHTML = '';
    photos.forEach((src, i) => {
      const cell = document.createElement('div');
      cell.className = `photo-cell ${src ? '' : 'empty'}`;
      if (src) {
        const img = document.createElement('img');
        img.src = src;
        img.className = state.fit === 'contain' ? 'fit-contain' : '';
        cell.appendChild(img);
      }
      a4Content.appendChild(cell);
    });
  }

  // ── File upload handling ──
  function triggerSlotUpload(index) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (file) loadFile(file, index);
    };
    input.click();
  }

  function loadFile(file, index) {
    const reader = new FileReader();
    reader.onload = (e) => {
      photos[index] = e.target.result;
      renderThumbnails();
      renderA4();
      showStatus(`Photo ${index + 1} added`, 'success');
    };
    reader.readAsDataURL(file);
  }

  function handleBulkFiles(files) {
    const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/')).slice(0, 6);
    if (imageFiles.length === 0) {
      showStatus('No valid images found', 'error');
      return;
    }
    let loaded = 0;
    imageFiles.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        // Fill next empty slot, or replace in order
        const targetIdx = photos.findIndex(p => p === null);
        photos[targetIdx === -1 ? idx % 6 : targetIdx] = e.target.result;
        loaded++;
        if (loaded === imageFiles.length) {
          renderThumbnails();
          renderA4();
          showStatus(`${loaded} photo(s) added`, 'success');
        }
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Drag & Drop ──
  uploadZone.addEventListener('click', () => bulkUpload.click());
  bulkUpload.addEventListener('change', (e) => handleBulkFiles(e.target.files));

  ['dragenter', 'dragover'].forEach(evt => {
    uploadZone.addEventListener(evt, (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(evt => {
    uploadZone.addEventListener(evt, (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
    });
  });
  uploadZone.addEventListener('drop', (e) => {
    if (e.dataTransfer.files.length) handleBulkFiles(e.dataTransfer.files);
  });

  // ── Control bindings ──
  function bindEvents() {
    document.getElementById('orientation').addEventListener('change', (e) => {
      state.orientation = e.target.value;
      renderA4();
    });
    document.getElementById('gridLayout').addEventListener('change', (e) => {
      state.layout = e.target.value;
      renderA4();
    });
    document.getElementById('margin').addEventListener('input', (e) => {
      state.margin = e.target.value;
      document.getElementById('marginVal').textContent = `${state.margin}mm`;
      renderA4();
    });
    document.getElementById('gap').addEventListener('input', (e) => {
      state.gap = e.target.value;
      document.getElementById('gapVal').textContent = `${state.gap}mm`;
      renderA4();
    });
    document.getElementById('fitMode').addEventListener('change', (e) => {
      state.fit = e.target.value;
      renderA4();
    });
    document.getElementById('bgColor').addEventListener('input', (e) => {
      state.bgColor = e.target.value;
      renderA4();
    });

    document.getElementById('downloadBtn').addEventListener('click', downloadPNG);
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('resetBtn').addEventListener('click', () => {
      photos.fill(null);
      renderThumbnails();
      renderA4();
      showStatus('All photos cleared', 'success');
    });
  }

  // ── Download as PNG ──
  async function downloadPNG() {
    const hasPhotos = photos.some(p => p !== null);
    if (!hasPhotos) {
      showStatus('Please add at least one photo first', 'error');
      return;
    }
    showStatus('Generating image...', 'success');

    try {
      const canvas = await html2canvas(a4Paper, {
        scale: 2,
        useCORS: true,
        backgroundColor: state.bgColor,
        logging: false
      });
      const link = document.createElement('a');
      link.download = `collage-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showStatus('✅ Downloaded successfully!', 'success');
    } catch (err) {
      showStatus('Failed to generate image', 'error');
      console.error(err);
    }
  }

  // ── Status helper ──
  function showStatus(msg, type) {
    status.textContent = msg;
    status.className = `status ${type}`;
    setTimeout(() => { status.style.display = 'none'; }, 3000);
  }

  // ── Start ──
  init();
</script>

</body>
</html>
